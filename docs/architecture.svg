<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AWS VPC architecture for the fullstack web app project</title>
<desc>A custom VPC containing two public subnets and four private subnets across two availability zones. The public subnet hosts a bastion host and an HAProxy load balancer, both with public IPs. The private subnets host two web servers, a MariaDB database, and a monitoring node, none of which have public IPs. A NAT Gateway in the public subnet provides outbound internet access to the private subnets.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="920" fill="#FFFFFF"/>

<g>
<rect x="270" y="20" width="140" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Internet</text>
</g>
<line x1="340" y1="60" x2="340" y2="98" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="100" width="600" height="780" rx="20" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="60" y="128" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">VPC: web_app_vpc</text>
<text x="60" y="146" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">10.1.0.0/16</text>

<g>
<rect x="540" y="118" width="84" height="36" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="582" y="132" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Internet</text>
<text x="582" y="146" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Gateway</text>
</g>

<rect x="64" y="170" width="552" height="190" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="80" y="196" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Public subnets (AZ-a / AZ-b)</text>
<text x="80" y="212" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">10.1.1.0/24, 10.1.2.0/24 — public IPs</text>

<g>
<rect x="90" y="232" width="200" height="56" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="190" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Bastion host</text>
<text x="190" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">SSH jump only · :22</text>
</g>

<g>
<rect x="390" y="232" width="200" height="56" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="490" y="252" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">HAProxy (web_LB)</text>
<text x="490" y="270" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">App :80 · Stats :8080</text>
</g>

<g>
<rect x="240" y="304" width="200" height="44" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="320" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">NAT Gateway</text>
<text x="340" y="336" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">outbound internet only</text>
</g>

<line x1="190" y1="288" x2="190" y2="304" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>
<line x1="490" y1="288" x2="490" y2="402" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="500" y="365" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">round robin</text>

<path d="M290 260 L340 260 L340 304" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>
