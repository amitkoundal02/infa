<text x="200" y="456" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">web_server_a</text>
<text x="200" y="474" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Apache/PHP :80 · :9100</text>
</g>

<g>
<rect x="380" y="436" width="200" height="56" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="456" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">web_server_b</text>
<text x="480" y="474" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Apache/PHP :80 · :9100</text>
</g>

<path d="M200 492 L200 510 L480 510 L480 492" fill="none" stroke="#5F5E5A" stroke-width="0.5"/>

<rect x="64" y="552" width="552" height="100" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="80" y="578" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#712B13">Private subnet — data tier</text>
<text x="80" y="594" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">10.1.21.0/24 — no public IP</text>

<g>
<rect x="240" y="604" width="200" height="38" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="623" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#712B13">DB (MariaDB) :3306 · :9100</text>
</g>

<line x1="340" y1="510" x2="340" y2="552" stroke="#5F5E5A" stroke-width="0.5" opacity="0.4"/>

<rect x="64" y="668" width="552" height="100" rx="14" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="80" y="694" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#72243E">Private subnet — monitoring tier</text>
<text x="80" y="710" font-family="Arial, sans-serif" font-size="12" fill="#993556">10.1.12.0/24 — no public IP</text>

<g>
<rect x="190" y="720" width="300" height="38" rx="10" fill="#F4C0D1" stroke="#993556" stroke-width="0.5"/>
<text x="340" y="739" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#72243E">Monitor: Prometheus :9090 · Grafana :3000</text>
</g>

<text x="340" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">scrapes :9100 on every node (lb, web1, web2, db)</text>

